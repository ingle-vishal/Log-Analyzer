log:
  path: "test_access.log"

thresholds:
  http_errors:
    window_seconds: 60
    min_count: 10
  brute_force:
    window_seconds: 60
    min_requests: 100
  slow_response:
    threshold_ms: 2000
  keywords:
    enabled: true
    terms:
      - "sql injection"
      - "../"
      - "<script"
      - "eval("
      - "/etc/passwd"
      - "union select"

alerting:
  cooldown_seconds: 300

email:
  enabled: true
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  use_tls: true
  username: "__xxxx@gmail.com"
  password: ""
  from_addr: "__xxx4@gmail.com"
  to_addrs:
    - "__xxx@gmail.com"
  subject_prefix: "[LogAlert]"